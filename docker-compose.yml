# Docker Compose 配置
version: '3.8'

services:
  galaxy-learning:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ARK_API_URL=${ARK_API_URL}
      - ARK_API_KEY=${ARK_API_KEY}
      - MODEL=${MODEL:-ep-20250619152236-qf8p8}
    restart: unless-stopped
    volumes:
      # 持久化用户数据
      - ./data:/app/data
    networks:
      - galaxy-network

networks:
  galaxy-network:
    driver: bridge
